name: Validate Viva Fuzzy Source

on:
  push:
    branches:
      - agent/viva-fuzzy-fix
    paths:
      - 'source/**'
      - '.github/workflows/validate-viva-fuzzy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flutter-web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source

    steps:
      - name: Checkout safe branch
        uses: actions/checkout@v4

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show toolchain versions
        run: |
          flutter --version
          dart --version

      - name: Resolve dependencies
        run: flutter pub get

      - name: Format source for validation
        run: dart format lib/main.dart

      - name: Static analysis
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build GitHub Pages web bundle
        run: flutter build web --release --base-href /hydrae_dss_final/

      - name: Upload build without deploying
        uses: actions/upload-artifact@v4
        with:
          name: hydrae-viva-web-build
          path: source/build/web
          if-no-files-found: error

